<!doctype html>
<html lang="en" data-theme="light" data-density="airy">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>hop · internal URL shortener</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  /* ── tokens ─────────────────────────────────────────────────────── */
  :root {
    --brand: #0B4DA2;
    --brand-ink: #0B4DA2;
    --brand-soft: rgba(11, 77, 162, 0.08);
    --brand-soft-2: rgba(11, 77, 162, 0.14);

    --bg: #FFFFFF;
    --bg-soft: #F8FAFC;
    --bg-elev: #FFFFFF;
    --ink: #111827;
    --ink-strong: #0B1320;
    --muted: #6B6F76;
    --muted-2: #9CA3AF;
    --line: #E5E7EB;
    --line-strong: #D1D5DB;

    --success: #16A34A;
    --success-bg: #ECFDF5;
    --warning: #B7791F;
    --warning-bg: #FEF3C7;
    --error: #DC2626;
    --error-bg: #FEE2E2;

    --shadow-sm: 0 1px 2px rgba(11, 19, 32, .06), 0 1px 1px rgba(11, 19, 32, .03);
    --shadow-md: 0 4px 12px rgba(11, 19, 32, .08), 0 2px 4px rgba(11, 19, 32, .04);
    --shadow-lg: 0 24px 60px -16px rgba(11, 19, 32, .18), 0 6px 16px rgba(11, 19, 32, .06);

    --radius: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;

    --gutter: 56px;
    --section-gap: 56px;
    --row-pad-y: 22px;
    --card-pad: 32px;
  }

  [data-theme="dark"] {
    --brand-soft: rgba(96, 165, 250, 0.12);
    --brand-soft-2: rgba(96, 165, 250, 0.20);

    --bg: #0F172A;
    --bg-soft: #13223A;
    --bg-elev: #1E293B;
    --ink: #F1F5F9;
    --ink-strong: #FFFFFF;
    --muted: #94A3B8;
    --muted-2: #64748B;
    --line: #273447;
    --line-strong: #334155;

    --success: #22C55E;
    --success-bg: rgba(34, 197, 94, 0.12);
    --warning: #FBBF24;
    --warning-bg: rgba(251, 191, 36, 0.12);
    --error: #F87171;
    --error-bg: rgba(248, 113, 113, 0.12);

    --shadow-sm: 0 1px 2px rgba(0, 0, 0, .35);
    --shadow-md: 0 6px 18px rgba(0, 0, 0, .35);
    --shadow-lg: 0 28px 70px -16px rgba(0, 0, 0, .55), 0 6px 16px rgba(0, 0, 0, .25);
  }

  [data-density="cozy"] {
    --gutter: 40px;
    --section-gap: 36px;
    --row-pad-y: 14px;
    --card-pad: 22px;
  }

  /* ── reset / base ───────────────────────────────────────────────── */
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background-color .25s ease, color .25s ease;
  }
  body::before {
    /* subtle warm/cool tinted page wash — matches brand profile depth */
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(1200px 600px at 78% -20%, var(--brand-soft), transparent 60%),
      radial-gradient(800px 500px at -10% 110%, var(--brand-soft), transparent 55%);
    opacity: .9;
    transition: opacity .3s ease;
  }
  [data-theme="dark"] body::before { opacity: .5; }

  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; cursor: pointer; }
  input { font: inherit; color: inherit; }
  code { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }

  ::selection { background: var(--brand-soft-2); color: var(--ink-strong); }

  .app {
    position: relative;
    z-index: 1;
    min-height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* ── topbar ─────────────────────────────────────────────────────── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px var(--gutter);
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    transition: background-color .25s, border-color .25s;
  }
  .logo { display: inline-flex; align-items: center; gap: 10px; }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--brand);
    box-shadow: 0 0 0 4px var(--brand-soft);
    transition: transform .35s cubic-bezier(.5,1.5,.6,1), box-shadow .35s;
  }
  .logo:hover .logo-dot { transform: translateY(-3px); }
  .logo-word {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -.01em;
    color: var(--ink-strong);
    line-height: 1;
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .env-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  .env-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--success) 22%, transparent);
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--brand);
    color: #fff;
    font-size: 12px; font-weight: 600;
    display: grid; place-items: center;
    letter-spacing: .02em;
  }
  .icon-btn {
    width: 32px; height: 32px;
    display: grid; place-items: center;
    background: transparent;
    color: var(--muted);
    border: 1px solid transparent;
    border-radius: 8px;
    transition: background-color .15s, color .15s, border-color .15s;
  }
  .icon-btn:hover {
    background: var(--bg-soft);
    color: var(--ink);
    border-color: var(--line);
  }
  .icon-btn.copied { color: var(--success); }
  .icon-btn-danger:hover { color: var(--error); background: var(--error-bg); border-color: transparent; }

  /* ── main ──────────────────────────────────────────────────────── */
  .main {
    flex: 1;
    padding: 64px var(--gutter) 32px;
    max-width: 1180px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: var(--section-gap);
  }
  [data-density="cozy"] .main { padding-top: 40px; }

  /* ── shortener ─────────────────────────────────────────────────── */
  .shortener { display: grid; grid-template-columns: 1fr; gap: 32px; }
  .shortener.shake { animation: shake .4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .prompt { max-width: 720px; }
  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--brand);
    margin-bottom: 18px;
    display: inline-block;
    padding: 5px 10px;
    background: var(--brand-soft);
    border-radius: 6px;
  }
  .display {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: clamp(38px, 5.4vw, 64px);
    line-height: 1.02;
    letter-spacing: -.02em;
    color: var(--ink-strong);
    margin: 0 0 14px;
    text-wrap: balance;
  }
  .display em {
    font-style: italic;
    color: var(--brand);
    font-weight: 700;
  }
  .lede {
    color: var(--muted);
    font-size: 17px;
    margin: 0;
    max-width: 520px;
  }
  .lede .nowrap { white-space: nowrap; }
  .lede code {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    padding: 1px 6px;
    border-radius: 5px;
    font-size: 14px;
    color: var(--ink);
  }

  .shortener-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-xl);
    padding: var(--card-pad);
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: background-color .25s, border-color .25s, box-shadow .25s;
  }
  [data-theme="dark"] .shortener-card { background: var(--bg-soft); }

  .field { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex; gap: 8px; align-items: baseline;
  }
  .field-hint {
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    color: var(--muted-2);
    font-size: 11px;
  }
  .field-err {
    font-size: 12px;
    color: var(--error);
    margin-top: 2px;
  }

  .input {
    width: 100%;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: var(--ink);
    outline: none;
    transition: border-color .15s, box-shadow .15s, background-color .15s;
  }
  .input::placeholder { color: var(--muted-2); }
  .input:hover { border-color: var(--line-strong); }
  .input:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .input-lg {
    font-size: 18px;
    padding: 16px 18px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    background: var(--bg);
  }
  [data-theme="dark"] .input-lg { background: var(--bg); }

  .field-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 760px) {
    .field-row { grid-template-columns: 1fr; }
  }

  .slug-input {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg);
    overflow: hidden;
    transition: border-color .15s, box-shadow .15s;
  }
  .slug-input:hover { border-color: var(--line-strong); }
  .slug-input:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .slug-prefix {
    padding: 12px 4px 12px 14px;
    color: var(--muted);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 14px;
    background: var(--bg-soft);
    border-right: 1px solid var(--line);
    display: flex; align-items: center;
  }
  .input-slug {
    border: 0;
    border-radius: 0;
    background: transparent;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 14px;
    flex: 1;
    min-width: 0;
  }
  .input-slug:focus { box-shadow: none; }
  .slug-dice {
    background: transparent;
    border: 0;
    border-left: 1px solid var(--line);
    color: var(--muted);
    padding: 0 12px;
    font-size: 14px;
    transition: color .15s, background-color .15s;
  }
  .slug-dice:hover { color: var(--brand); background: var(--brand-soft); }

  /* segmented control */
  .seg {
    display: inline-flex;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 3px;
    gap: 2px;
  }
  .seg-btn {
    background: transparent;
    border: 0;
    padding: 8px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    transition: background-color .15s, color .15s, box-shadow .15s;
    white-space: nowrap;
  }
  .seg-btn:hover { color: var(--ink); }
  .seg-btn.on {
    background: var(--bg-elev);
    color: var(--ink-strong);
    box-shadow: var(--shadow-sm);
  }
  [data-theme="dark"] .seg-btn.on { background: var(--bg-elev); }
  .seg-sm .seg-btn { padding: 6px 12px; font-size: 12px; }

  .shortener-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding-top: 8px;
    border-top: 1px dashed var(--line);
    margin-top: 4px;
    padding-top: 20px;
  }
  .preview {
    display: flex; flex-direction: column; gap: 4px; min-width: 0;
  }
  .preview-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted-2);
  }
  .preview-url {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 16px;
    color: var(--muted);
    transition: color .2s;
  }
  .preview-url b {
    font-weight: 500;
    color: var(--muted-2);
  }
  .preview-url.ready { color: var(--ink); }
  .preview-url.ready b { color: var(--brand); font-weight: 600; }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px;
    background: var(--brand);
    color: #fff;
    border: 1px solid color-mix(in srgb, var(--brand) 85%, #fff 15%);
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .01em;
    box-shadow: 0 1px 2px rgba(11, 77, 162, .12), inset 0 1px 0 rgba(255, 255, 255, .12);
    transition: transform .15s cubic-bezier(.5,1.5,.6,1), background-color .15s, box-shadow .15s;
    white-space: nowrap;
  }
  .btn-primary:hover {
    background: color-mix(in srgb, var(--brand) 90%, #000 10%);
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(11, 77, 162, .25), inset 0 1px 0 rgba(255, 255, 255, .15);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary.disabled {
    opacity: .5;
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn-primary.disabled:hover { transform: none; }
  .btn-primary svg { transition: transform .2s; }
  .btn-primary:hover svg { transform: translateX(3px); }

  /* ── recent links ──────────────────────────────────────────────── */
  .recent { display: flex; flex-direction: column; gap: 20px; }
  .recent-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .section-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 28px;
    margin: 0;
    color: var(--ink-strong);
    letter-spacing: -.01em;
  }
  .section-sub {
    margin: 4px 0 0;
    color: var(--muted);
    font-size: 13px;
  }
  .recent-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .search {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 7px 12px;
    color: var(--muted);
    transition: border-color .15s, box-shadow .15s;
    min-width: 240px;
  }
  .search:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .search input {
    background: transparent;
    border: 0;
    outline: none;
    font-size: 13px;
    color: var(--ink);
    width: 100%;
  }
  .search input::placeholder { color: var(--muted-2); }

  .rows {
    display: flex; flex-direction: column;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }
  [data-theme="dark"] .rows { background: var(--bg-soft); }

  .row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 24px;
    align-items: center;
    padding: var(--row-pad-y) 24px;
    border-bottom: 1px solid var(--line);
    transition: background-color .15s;
    position: relative;
  }
  .row:last-child { border-bottom: 0; }
  .row:hover { background: var(--bg-soft); }
  [data-theme="dark"] .row:hover { background: var(--bg-elev); }
  .row-new {
    animation: rowIn .55s cubic-bezier(.22,1,.36,1);
    background: var(--brand-soft);
  }
  .row-new::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--brand);
    animation: stripeOut 1.8s ease-out forwards;
  }
  @keyframes rowIn {
    from { transform: translateY(-12px); opacity: 0; }
    to   { transform: translateY(0);     opacity: 1; }
  }
  @keyframes stripeOut {
    0%   { opacity: 1; }
    70%  { opacity: 1; }
    100% { opacity: 0; }
  }
  .row-expired { opacity: .58; }
  .row-expired .short-link { text-decoration: line-through; }

  .row-main { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .row-short { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .short-link {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 15px;
    color: var(--ink-strong);
    display: inline-flex; align-items: baseline;
  }
  .short-link:hover .short-slug { color: var(--brand); }
  .short-domain { color: var(--muted); font-weight: 400; }
  .short-slug { color: var(--ink-strong); font-weight: 600; transition: color .15s; }

  .row-dest {
    display: flex; gap: 8px;
    font-size: 13px;
    color: var(--muted);
    min-width: 0;
  }
  .row-host {
    color: var(--ink);
    font-weight: 500;
    flex-shrink: 0;
  }
  .row-sep { color: var(--muted-2); }
  .row-title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  .row-meta {
    display: flex; gap: 28px;
    align-items: center;
  }
  [data-metrics="0"] .row-meta { display: none; }
  .metric {
    text-align: right;
    min-width: 64px;
  }
  .metric-num {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--ink-strong);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -.01em;
  }
  .metric-muted .metric-num {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
  }
  .metric-lbl {
    margin-top: 4px;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted-2);
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .row-actions { display: flex; gap: 4px; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .01em;
  }
  .badge-muted { background: var(--bg-soft); color: var(--muted); border: 1px solid var(--line); }
  .badge-warning { background: var(--warning-bg); color: var(--warning); }
  .badge-error { background: var(--error-bg); color: var(--error); }
  [data-theme="dark"] .badge-muted { background: var(--bg-elev); }

  /* empty state */
  .empty {
    padding: 56px 24px;
    text-align: center;
    background: var(--bg-elev);
    border: 1px dashed var(--line-strong);
    border-radius: var(--radius-lg);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  [data-theme="dark"] .empty { background: var(--bg-soft); }
  .empty-mark {
    color: var(--brand);
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--brand-soft);
    display: grid; place-items: center;
    margin-bottom: 8px;
  }
  .empty-title { font-weight: 600; font-size: 16px; color: var(--ink-strong); }
  .empty-sub { color: var(--muted); font-size: 14px; }

  /* ── footer ─────────────────────────────────────────────────────── */
  .footer {
    padding: 24px var(--gutter);
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 12px;
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
  }
  .dot-sep { color: var(--muted-2); }
  .foot-link { color: var(--muted); transition: color .15s; }
  .foot-link:hover { color: var(--brand); }

  /* ── toast ─────────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--ink-strong);
    color: #fff;
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    z-index: 100;
    animation: toastIn .25s cubic-bezier(.22,1,.36,1);
  }
  [data-theme="dark"] .toast { background: #fff; color: var(--ink-strong); }
  .toast svg { color: var(--success); }
  [data-theme="dark"] .toast svg { color: var(--success); }
  @keyframes toastIn {
    from { transform: translate(-50%, 12px); opacity: 0; }
    to   { transform: translate(-50%, 0);    opacity: 1; }
  }

  /* ── responsive ─────────────────────────────────────────────────── */
  @media (max-width: 860px) {
    :root { --gutter: 24px; --card-pad: 22px; }
    .row { grid-template-columns: 1fr; gap: 12px; }
    .row-meta { justify-content: flex-start; gap: 32px; }
